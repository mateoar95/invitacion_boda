<!-- Show a helpful message if, after 15s, React still hasn't mounted -->

        + '<p>La invitación está tardando en cargar. Por favor verifica tu conexión e intenta <a href="javascript:location.reload()" style="color:#c4574a;">recargar la página</a>.</p>'

    }
  }, 15000);
</script>
